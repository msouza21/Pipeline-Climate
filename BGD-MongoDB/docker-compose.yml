services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mgdata
      MONGO_INITDB_ROOT_PASSWORD: mgdata21
    ports:
      - 27019:27017
    volumes:
      - ./mgdata:/data/db
      - G:/Files/Files Docker/BGD-Projects:/data/bgd
    command: mongod --bind_ip_all

